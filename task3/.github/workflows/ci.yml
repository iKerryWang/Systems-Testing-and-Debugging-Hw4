# Standalone task3 project (use this layout when task3/ is the repo root).
# If task3 lives inside a monorepo, CI at the parent repo root may call :task3:test instead.

name: CI

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Test and JaCoCo
        run: chmod +x gradlew && ./gradlew test jacocoTestReport --no-daemon

      - name: JaCoCo badges (fail on instruction or branch regression)
        id: jacoco
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: build/reports/jacoco/test/jacocoTestReport.csv
          badges-directory: .github/badges
          generate-coverage-badge: true
          generate-branches-badge: true
          generate-summary: true
          fail-on-coverage-decrease: true
          fail-on-branches-decrease: true
          coverage-decrease-limit: 100
          branches-decrease-limit: 100

      - name: Log coverage
        run: |
          echo "coverage=${{ steps.jacoco.outputs.coverage }}"
          echo "branches=${{ steps.jacoco.outputs.branches }}"

      - name: Commit badges
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges
          if git diff --staged --quiet; then
            echo "No badge changes"
          else
            git commit -m "chore: update JaCoCo badges"
            git push
          fi
